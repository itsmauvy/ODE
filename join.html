<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JOIN — ODE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <!-- CURSOR -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursor-follower"></div>

  <!-- HEADER -->
  <header class="header">
    <a href="login.html" class="back-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M11 4L6 9l5 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      BACK
    </a>
    <a href="index.html" class="logo">ODE</a>
    <div style="width:80px"></div>
  </header>

  <!-- MAIN -->
  <main class="main">
    <div class="form-wrap">

      <!-- SIGNUP FORM -->
      <div class="form-section" id="signup-section">

        <div class="brand-line">
          <span class="brand-tag">ODE MEMBERSHIP</span>
        </div>
        <h1 class="form-title">JOIN<br/><em>ODE</em></h1>

        <form class="form" id="signup-form" novalidate>
          <div class="field-row">
            <div class="field-group">
              <label class="field-label">이름</label>
              <input class="field-input" type="text" id="signup-name" placeholder="홍길동" />
              <span class="field-error" id="signup-name-err"></span>
            </div>
            <div class="field-group">
              <label class="field-label">생년월일</label>
              <input class="field-input" type="text" id="signup-birth" placeholder="YYYY.MM.DD" maxlength="10" />
            </div>
          </div>
          <div class="field-group">
            <label class="field-label">이메일</label>
            <input class="field-input" type="email" id="signup-email" placeholder="example@ode.com" />
            <span class="field-error" id="signup-email-err"></span>
          </div>
          <div class="field-group">
            <label class="field-label">비밀번호</label>
            <div class="pw-wrap">
              <input class="field-input" type="password" id="signup-pw" placeholder="8자 이상 입력" />
              <button type="button" class="pw-toggle" id="signup-pw-toggle">
                <svg class="eye-icon" id="signup-eye-show" width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z" stroke="currentColor" stroke-width="1.4"/>
                  <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.4"/>
                </svg>
                <svg class="eye-icon hidden" id="signup-eye-hide" width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19M1 1l22 22" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                </svg>
              </button>
            </div>
            <span class="field-error" id="signup-pw-err"></span>
            <div class="pw-strength" id="pw-strength">
              <div class="strength-bar" id="strength-bar"></div>
            </div>
            <span class="strength-label" id="strength-label"></span>
          </div>
          <div class="field-group">
            <label class="field-label">비밀번호 확인</label>
            <input class="field-input" type="password" id="signup-pw2" placeholder="비밀번호 재입력" />
            <span class="field-error" id="signup-pw2-err"></span>
          </div>
          <div class="terms-group">
            <label class="checkbox-wrap">
              <input type="checkbox" id="terms-all" />
              <span class="checkbox-custom"></span>
              <span class="checkbox-label bold">전체 동의</span>
            </label>
            <div class="terms-items">
              <label class="checkbox-wrap">
                <input type="checkbox" class="terms-item" id="terms1" />
                <span class="checkbox-custom"></span>
                <span class="checkbox-label">[필수] 이용약관 동의</span>
              </label>
              <label class="checkbox-wrap">
                <input type="checkbox" class="terms-item" id="terms2" />
                <span class="checkbox-custom"></span>
                <span class="checkbox-label">[필수] 개인정보 처리방침 동의</span>
              </label>
              <label class="checkbox-wrap">
                <input type="checkbox" class="terms-item" id="terms3" />
                <span class="checkbox-custom"></span>
                <span class="checkbox-label">[선택] 마케팅 정보 수신 동의</span>
              </label>
            </div>
            <span class="field-error" id="terms-err"></span>
          </div>
          <button type="submit" class="btn-submit">
            <span>JOIN NOW</span>
          </button>
        </form>

        <p class="switch-text">
          이미 회원이신가요?
          <a class="switch-btn" href="login.html">로그인</a>
        </p>
      </div>

    </div>
  </main>

  <!-- SUCCESS TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    /* ── JOIN PAGE (standalone, no module) ── */
    const $ = (id) => document.getElementById(id);

    /* password show / hide */
    $('signup-pw-toggle').addEventListener('click', () => {
      const pw = $('signup-pw');
      const show = pw.type === 'password';
      pw.type = show ? 'text' : 'password';
      $('signup-eye-show').classList.toggle('hidden', show);
      $('signup-eye-hide').classList.toggle('hidden', !show);
    });

    /* 생년월일 자동 점(.) */
    $('signup-birth').addEventListener('input', (e) => {
      let v = e.target.value.replace(/[^0-9]/g, '').slice(0, 8);
      if (v.length > 6) v = v.slice(0,4) + '.' + v.slice(4,6) + '.' + v.slice(6);
      else if (v.length > 4) v = v.slice(0,4) + '.' + v.slice(4);
      e.target.value = v;
    });

    /* 비밀번호 강도 */
    function pwScore(v) {
      let s = 0;
      if (v.length >= 8) s++;
      if (/[A-Z]/.test(v) || /[a-z]/.test(v)) s++;
      if (/[0-9]/.test(v)) s++;
      if (/[^A-Za-z0-9]/.test(v)) s++;
      return s;
    }
    $('signup-pw').addEventListener('input', (e) => {
      const v = e.target.value;
      const bar = $('strength-bar');
      const label = $('strength-label');
      if (!v) { bar.style.width = '0%'; label.textContent = ''; bar.style.background = ''; return; }
      const score = pwScore(v);
      const pct = ['20%','40%','70%','100%'][Math.max(0, score - 1)] || '20%';
      const colors = ['#c98a8a','#d4a882','#a8b08a','#7d8a5f'];
      const texts  = ['약함','보통','양호','강함'];
      bar.style.width = pct;
      bar.style.background = colors[Math.max(0, score - 1)] || colors[0];
      label.textContent = texts[Math.max(0, score - 1)] || texts[0];
      label.style.color = colors[Math.max(0, score - 1)] || colors[0];
    });

    /* 전체 동의 ↔ 개별 동의 */
    const termsAll = $('terms-all');
    const termsItems = [...document.querySelectorAll('.terms-item')];
    termsAll.addEventListener('change', () => {
      termsItems.forEach(t => t.checked = termsAll.checked);
    });
    termsItems.forEach(t => t.addEventListener('change', () => {
      termsAll.checked = termsItems.every(x => x.checked);
    }));

    /* toast */
    function toast(msg) {
      const t = $('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2400);
    }

    /* 유효성 검사 + 제출 */
    function setErr(id, msg) { const el = $(id); if (el) el.textContent = msg || ''; }

    $('signup-form').addEventListener('submit', (e) => {
      e.preventDefault();
      let ok = true;
      ['signup-name-err','signup-email-err','signup-pw-err','signup-pw2-err','terms-err'].forEach(i => setErr(i,''));

      if (!$('signup-name').value.trim()) { setErr('signup-name-err','이름을 입력해 주세요.'); ok = false; }

      const email = $('signup-email').value.trim();
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setErr('signup-email-err','올바른 이메일을 입력해 주세요.'); ok = false; }

      const pw = $('signup-pw').value;
      if (pw.length < 8) { setErr('signup-pw-err','비밀번호는 8자 이상이어야 합니다.'); ok = false; }

      if ($('signup-pw2').value !== pw || !pw) { setErr('signup-pw2-err','비밀번호가 일치하지 않습니다.'); ok = false; }

      if (!$('terms1').checked || !$('terms2').checked) { setErr('terms-err','필수 약관에 동의해 주세요.'); ok = false; }

      if (!ok) return;

      toast('ODE 회원가입이 완료되었습니다.');
      setTimeout(() => { location.href = 'login.html'; }, 1600);
    });

    /* cursor (page-level, matches other pages) */
    const cursor = document.getElementById('cursor');
    const follower = document.getElementById('cursor-follower');
    if (cursor && follower) {
      let mx=0,my=0,fx=0,fy=0;
      window.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; cursor.style.transform=`translate(-50%,-50%) translate(${mx}px,${my}px)`; });
      (function loop(){ fx+=(mx-fx)*0.15; fy+=(my-fy)*0.15; follower.style.transform=`translate(-50%,-50%) translate(${fx}px,${fy}px)`; requestAnimationFrame(loop); })();
    }
  </script>
</body>
</html>
