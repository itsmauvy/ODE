<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHECKOUT — ODE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="checkout.css" />
</head>
<body>

  <!-- CURSOR -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursor-follower"></div>

  <!-- HEADER -->
  <div class="co-header-wrap"><header class="co-header">
    <a href="index.html" class="co-logo">
      <img src="images/ode logo.png" alt="ODE" />
    </a>
    <div class="co-steps">
      <span class="co-step active">CART</span>
      <span class="co-step-divider">—</span>
      <span class="co-step active">INFORMATION</span>
      <span class="co-step-divider">—</span>
      <span class="co-step">PAYMENT</span>
    </div>
    <a href="shop.html" class="co-back">← CONTINUE SHOPPING</a>
  </header></div>

  <!-- MAIN -->
  <main class="co-main">

    <!-- LEFT: FORM -->
    <section class="co-form-section">

      <!-- DELIVERY -->
      <div class="co-block">
        <h2 class="co-block-title">DELIVERY</h2>
        <div class="co-field">
          <label class="co-label" for="recipient">받는 사람</label>
          <input class="co-input" id="recipient" type="text" placeholder="홍길동" autocomplete="name" />
        </div>
        <div class="co-field">
          <label class="co-label" for="phone">전화번호</label>
          <input class="co-input" id="phone" type="tel" placeholder="010-0000-0000" autocomplete="tel" />
        </div>
        <div class="co-field">
          <label class="co-label" for="address1">기본 주소</label>
          <input class="co-input" id="address1" type="text" placeholder="도로명 주소" autocomplete="address-line1" />
        </div>
        <div class="co-field">
          <label class="co-label" for="address2">상세 주소</label>
          <input class="co-input" id="address2" type="text" placeholder="아파트, 동/호수 등" autocomplete="address-line2" />
        </div>
        <div class="co-field">
          <label class="co-label" for="memo">배송 메모 <span class="co-optional">(선택)</span></label>
          <select class="co-input co-select" id="memo">
            <option value="">선택하세요</option>
            <option>문 앞에 놔주세요</option>
            <option>경비실에 맡겨주세요</option>
            <option>부재시 연락 부탁드려요</option>
            <option>직접 입력</option>
          </select>
        </div>
      </div>

      <!-- COUPON / POINTS -->
      <div class="co-block">
        <h2 class="co-block-title">DISCOUNT</h2>
        <div class="co-field">
          <label class="co-label" for="coupon">쿠폰 코드</label>
          <div class="co-postcode-row">
            <input class="co-input" id="coupon" type="text" placeholder="코드를 입력하세요" />
            <button class="co-btn-secondary" type="button">적용</button>
          </div>
        </div>
        <div class="co-field">
          <label class="co-label" for="points">포인트 사용 <span class="co-points-avail" id="points-avail">(보유: 0P)</span></label>
          <div class="co-postcode-row">
            <input class="co-input" id="points" type="number" placeholder="0" min="0" />
            <button class="co-btn-secondary" type="button" id="use-all-points">전액 사용</button>
          </div>
        </div>
      </div>

      <!-- PAYMENT METHOD -->
      <div class="co-block">
        <h2 class="co-block-title">PAYMENT</h2>
        <div class="co-pay-options">
          <label class="co-pay-option">
            <input type="radio" name="payment" value="card" checked />
            <span class="co-pay-box">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="2" y="5" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M2 10h20" stroke="currentColor" stroke-width="1.4"/></svg>
              신용/체크카드
            </span>
          </label>
          <label class="co-pay-option">
            <input type="radio" name="payment" value="transfer" />
            <span class="co-pay-box">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.4"/><path d="M8 12h8M12 8v8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
              무통장 입금
            </span>
          </label>
          <label class="co-pay-option">
            <input type="radio" name="payment" value="kakao" />
            <span class="co-pay-box">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><ellipse cx="12" cy="11" rx="9" ry="7.5" fill="#FAE100"/><ellipse cx="12" cy="11" rx="9" ry="7.5" stroke="#3C1E1E" stroke-width="1.2"/><path d="M8.5 12.5l1.5-3h4l1.5 3" stroke="#3C1E1E" stroke-width="1.2" stroke-linejoin="round"/></svg>
              카카오페이
            </span>
          </label>
          <label class="co-pay-option">
            <input type="radio" name="payment" value="naver" />
            <span class="co-pay-box">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect width="24" height="24" rx="4" fill="#03C75A"/><path d="M7 17V7l4.5 6.5V7M12.5 7v10l4.5-6.5V17" stroke="white" stroke-width="1.4" stroke-linejoin="round"/></svg>
              네이버페이
            </span>
          </label>
        </div>

        <!-- 카드 상세 (card 선택 시) -->
        <div class="co-card-detail" id="co-card-detail">
          <div class="co-field">
            <label class="co-label" for="card-num">카드 번호</label>
            <input class="co-input" id="card-num" type="text" placeholder="0000 0000 0000 0000" maxlength="19" />
          </div>
          <div class="co-row">
            <div class="co-field">
              <label class="co-label" for="card-exp">유효기간</label>
              <input class="co-input" id="card-exp" type="text" placeholder="MM / YY" maxlength="7" />
            </div>
            <div class="co-field">
              <label class="co-label" for="card-cvc">CVC</label>
              <input class="co-input" id="card-cvc" type="text" placeholder="•••" maxlength="3" />
            </div>
          </div>
          <div class="co-field">
            <label class="co-label" for="installment">할부</label>
            <select class="co-input co-select" id="installment">
              <option>일시불</option>
              <option>2개월</option>
              <option>3개월</option>
              <option>6개월</option>
              <option>12개월</option>
            </select>
          </div>
        </div>
      </div>

      <!-- AGREE -->
      <div class="co-block co-block--agree">
        <label class="co-checkbox-row co-agree-all">
          <input type="checkbox" id="agree-all" />
          <span class="co-checkbox-box"></span>
          <span class="co-checkbox-label co-checkbox-label--bold">전체 동의</span>
        </label>
        <div class="co-agree-divider"></div>
        <label class="co-checkbox-row">
          <input type="checkbox" class="agree-item" />
          <span class="co-checkbox-box"></span>
          <span class="co-checkbox-label">[필수] 이용약관 동의 <a href="#" class="co-agree-link">보기</a></span>
        </label>
        <label class="co-checkbox-row">
          <input type="checkbox" class="agree-item" />
          <span class="co-checkbox-box"></span>
          <span class="co-checkbox-label">[필수] 개인정보 수집 및 이용 동의 <a href="#" class="co-agree-link">보기</a></span>
        </label>
        <label class="co-checkbox-row">
          <input type="checkbox" class="agree-item" />
          <span class="co-checkbox-box"></span>
          <span class="co-checkbox-label">[선택] 마케팅 정보 수신 동의</span>
        </label>
      </div>

      <button class="co-submit" id="co-submit" type="button">결제하기</button>

    </section>

    <!-- RIGHT: ORDER SUMMARY -->
    <aside class="co-summary">
      <div class="co-summary-inner">
        <h2 class="co-summary-title">ORDER SUMMARY</h2>

        <div class="co-summary-items" id="co-summary-items">
          <!-- JS로 채워짐 -->
          <div class="co-summary-empty">장바구니가 비어 있어요.<br/><a href="shop.html">쇼핑 계속하기 →</a></div>
        </div>

        <div class="co-summary-calc">
          <div class="co-calc-row">
            <span>상품 금액</span>
            <span id="co-subtotal">0원</span>
          </div>
          <div class="co-calc-row">
            <span>배송비</span>
            <span id="co-shipping">3,000원</span>
          </div>
          <div class="co-calc-row co-calc-row--discount" id="co-discount-row" style="display:none">
            <span>할인</span>
            <span id="co-discount">-0원</span>
          </div>
          <div class="co-calc-divider"></div>
          <div class="co-calc-row co-calc-row--total">
            <span>총 결제 금액</span>
            <span id="co-total">0원</span>
          </div>
          <p class="co-free-ship-note" id="co-free-ship-note"></p>
        </div>
      </div>
    </aside>

  </main>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="cart.js"></script>
  <script src="main.js"></script>
  <script src="checkout.js"></script>
</body>
</html>
