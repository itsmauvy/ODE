<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHOP — ODE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="cart.css" />
  <link rel="stylesheet" href="shop.css" />
</head>
<body>

  <!-- CURSOR -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursor-follower"></div>

  <!-- HEADER -->
  <header class="header" id="header" style="opacity:1">
    <nav class="nav-left">
      <div class="nav-item" id="nav-shop">
        <a href="shop.html" class="nav-link">SHOP</a>
      </div>
      <a href="about.html" class="nav-link">ABOUT</a>
      <a href="#stockist" class="nav-link">STOCKIST</a>
    </nav>
    <a href="index.html" class="logo">
      <img src="images/ode logo.png" alt="ODE" />
    </a>
    <nav class="nav-right">
      <div class="nav-search" id="nav-search">
        <span class="nav-search-label" id="nav-search-label">SEARCH</span>
        <div class="nav-search-field">
          <svg class="nav-search-icon" width="13" height="13" viewBox="0 0 20 20" fill="none">
            <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M13 13l4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <input class="nav-search-input" id="nav-search-input" type="text" autocomplete="off" spellcheck="false" placeholder="포켓블러셔" />
        </div>
      </div>
      <a href="login.html" class="nav-link">LOGIN</a>
      <a href="#" class="nav-link" id="bag-btn">BAG (<span class="bag-count-el">0</span>)</a>
    </nav>
  </header>

  <!-- MEGA DROPDOWN -->
  <div class="mega-menu" id="mega-menu">
    <div class="mega-inner">
      <div class="mega-tabs">
        <button class="mega-tab active" data-cat="all">ALL</button>
        <button class="mega-tab" data-cat="best">BEST</button>
        <button class="mega-tab" data-cat="new">NEW</button>
        <button class="mega-tab" data-cat="lip">LIP</button>
        <button class="mega-tab" data-cat="face">FACE</button>
        <button class="mega-tab" data-cat="fragrance">FRAGRANCE</button>
        <button class="mega-tab" data-cat="body">BODY</button>
        <button class="mega-tab" data-cat="etc">ETC</button>
        <div class="mega-tab-divider"></div>
        <button class="mega-tab collection-tab" data-cat="collection">COLLECTION</button>
      </div>
      <div class="mega-products" id="mega-products"></div>
      <a href="shop.html" class="mega-shop-all">SHOP ALL →</a>
    </div>
  </div>

  <!-- BAG SIDEBAR -->
  <div class="bag-overlay" id="bag-overlay"></div>
  <aside class="bag-sidebar" id="bag-sidebar">
    <div class="bag-header">
      <span class="bag-header-count">0 ITEMS</span>
      <button class="bag-close" id="bag-close">✕</button>
    </div>
    <div id="bag-shipping-bar"></div>
    <div class="bag-body" id="bag-body"></div>
    <div class="bag-footer" id="bag-footer"></div>
  </aside>

  <!-- HERO -->
  <section class="shop-hero">
    <img src="images/ode hero1.png" alt="ODE" class="shop-hero-img" />
    <div class="shop-hero-overlay"></div>
    <div class="shop-hero-text">
      <p class="shop-hero-eyebrow">ODE COLLECTION</p>
      <h1 class="shop-hero-title">Good Things<br/><em>Worth Carrying.</em></h1>
    </div>
  </section>

  <!-- FILTER BAR -->
  <div class="shop-filter-bar">
    <div class="shop-filter-pills">
      <button class="filter-pill active" data-filter="all">ALL</button>
      <button class="filter-pill" data-filter="best">BEST</button>
      <button class="filter-pill" data-filter="new">NEW</button>
      <button class="filter-pill" data-filter="face">FACE</button>
      <button class="filter-pill" data-filter="lip">LIP</button>
      <button class="filter-pill" data-filter="fragrance">FRAGRANCE</button>
      <button class="filter-pill" data-filter="body">BODY</button>
      <button class="filter-pill" data-filter="etc">ETC</button>
    </div>
    <div class="shop-filter-right">
      <span class="shop-count" id="shop-count">7 products</span>
      <div class="shop-sort">
        <label for="shop-sort-select">Sort:</label>
        <select id="shop-sort-select">
          <option value="featured">Featured</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="name">Name</option>
        </select>
      </div>
    </div>
  </div>

  <!-- PRODUCT GRID -->
  <section class="shop-grid-section">
    <div class="shop-grid" id="shop-grid"></div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-top">
      <div class="footer-logo">ODE</div>
      <div class="footer-links">
        <a href="#">이용약관</a>
        <a href="#">개인정보처리방침</a>
        <a href="#">고객센터</a>
        <a href="about.html">브랜드 소개</a>
      </div>
    </div>
    <div class="footer-bottom">
      <p>© 2026 ODE. All rights reserved.</p>
      <div class="footer-sns">
        <a href="#">INSTAGRAM</a>
        <a href="#">NAVER</a>
      </div>
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="cart.js"></script>
  <script src="nav.js"></script>
  <script src="shop.js"></script>
  <script>
    /* cursor */
    const cursor = document.getElementById('cursor');
    const follower = document.getElementById('cursor-follower');
    let mx=0,my=0,fx=0,fy=0;
    window.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; gsap.set(cursor,{x:mx,y:my}); });
    (function loop(){ fx+=(mx-fx)*0.15; fy+=(my-fy)*0.15; gsap.set(follower,{x:fx,y:fy}); requestAnimationFrame(loop); })();
  </script>
</body>
</html>
