<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOGIN — ODE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <!-- CURSOR -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursor-follower"></div>

  <!-- HEADER -->
  <header class="header">
    <a href="index.html" class="back-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M11 4L6 9l5 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      BACK
    </a>
    <a href="index.html" class="logo">ODE</a>
    <div style="width:80px"></div>
  </header>

  <!-- MAIN -->
  <main class="main">
    <div class="form-wrap" id="form-wrap">

      <!-- LOGIN FORM -->
      <div class="form-section" id="login-section">

        <h1 class="form-title">LOGIN</h1>

        <form class="form" id="login-form" novalidate>
          <div class="field-group">
            <label class="field-label">EMAIL</label>
            <input class="field-input" type="email" id="login-email" placeholder="example@ode.com" autocomplete="email" />
            <span class="field-error" id="login-email-err"></span>
          </div>
          <div class="field-group">
            <label class="field-label">PASSWORD</label>
            <div class="pw-wrap">
              <input class="field-input" type="password" id="login-pw" placeholder="비밀번호 입력" autocomplete="current-password" />
              <button type="button" class="pw-toggle" id="login-pw-toggle">
                <svg class="eye-icon" id="eye-show" width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z" stroke="currentColor" stroke-width="1.4"/>
                  <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.4"/>
                </svg>
                <svg class="eye-icon hidden" id="eye-hide" width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19M1 1l22 22" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                </svg>
              </button>
            </div>
            <span class="field-error" id="login-pw-err"></span>
          </div>
          <div class="form-options">
            <label class="checkbox-wrap">
              <input type="checkbox" id="remember" />
              <span class="checkbox-custom"></span>
              <span class="checkbox-label">로그인 상태 유지</span>
            </label>
            <a href="#" class="forgot-link">비밀번호 찾기</a>
          </div>
          <button type="submit" class="btn-submit" id="login-submit">
            <span id="login-btn-text">LOGIN</span>
            <div class="btn-spinner hidden" id="login-spinner"></div>
          </button>
        </form>

        <div class="divider"><span>OR</span></div>

        <div class="social-btns">
          <button class="social-btn kakao">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M9 1.5C4.86 1.5 1.5 4.14 1.5 7.38c0 2.1 1.38 3.93 3.45 4.98L4.08 15l3.6-2.37c.42.06.87.09 1.32.09 4.14 0 7.5-2.64 7.5-5.88S13.14 1.5 9 1.5z" fill="#3C1E1E"/>
            </svg>
            카카오로 계속하기
          </button>
          <button class="social-btn naver">
            <span class="naver-n">N</span>
            네이버로 계속하기
          </button>
        </div>

        <p class="switch-text">
          아직 회원이 아니신가요?
          <a class="switch-btn" href="join.html">회원가입</a>
        </p>
      </div>

      <!-- SIGNUP FORM -->
      <div class="form-section hidden" id="signup-section">

        <div class="brand-line">
          <span class="brand-tag">ODE MEMBERSHIP</span>
        </div>
        <h1 class="form-title">JOIN<br/><em>ODE</em></h1>

        <form class="form" id="signup-form" novalidate>
          <div class="field-row">
            <div class="field-group">
              <label class="field-label">이름</label>
              <input class="field-input" type="text" id="signup-name" placeholder="홍길동" />
              <span class="field-error" id="signup-name-err"></span>
            </div>
            <div class="field-group">
              <label class="field-label">생년월일</label>
              <input class="field-input" type="text" id="signup-birth" placeholder="YYYY.MM.DD" maxlength="10" />
            </div>
          </div>
          <div class="field-group">
            <label class="field-label">이메일</label>
            <input class="field-input" type="email" id="signup-email" placeholder="example@ode.com" />
            <span class="field-error" id="signup-email-err"></span>
          </div>
          <div class="field-group">
            <label class="field-label">비밀번호</label>
            <div class="pw-wrap">
              <input class="field-input" type="password" id="signup-pw" placeholder="8자 이상 입력" />
              <button type="button" class="pw-toggle" id="signup-pw-toggle">
                <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z" stroke="currentColor" stroke-width="1.4"/>
                  <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.4"/>
                </svg>
              </button>
            </div>
            <span class="field-error" id="signup-pw-err"></span>
            <div class="pw-strength" id="pw-strength">
              <div class="strength-bar" id="strength-bar"></div>
            </div>
            <span class="strength-label" id="strength-label"></span>
          </div>
          <div class="field-group">
            <label class="field-label">비밀번호 확인</label>
            <input class="field-input" type="password" id="signup-pw2" placeholder="비밀번호 재입력" />
            <span class="field-error" id="signup-pw2-err"></span>
          </div>
          <div class="terms-group">
            <label class="checkbox-wrap">
              <input type="checkbox" id="terms-all" />
              <span class="checkbox-custom"></span>
              <span class="checkbox-label bold">전체 동의</span>
            </label>
            <div class="terms-items">
              <label class="checkbox-wrap">
                <input type="checkbox" class="terms-item" id="terms1" />
                <span class="checkbox-custom"></span>
                <span class="checkbox-label">[필수] 이용약관 동의</span>
              </label>
              <label class="checkbox-wrap">
                <input type="checkbox" class="terms-item" id="terms2" />
                <span class="checkbox-custom"></span>
                <span class="checkbox-label">[필수] 개인정보 처리방침 동의</span>
              </label>
              <label class="checkbox-wrap">
                <input type="checkbox" class="terms-item" id="terms3" />
                <span class="checkbox-custom"></span>
                <span class="checkbox-label">[선택] 마케팅 정보 수신 동의</span>
              </label>
            </div>
            <span class="field-error" id="terms-err"></span>
          </div>
          <button type="submit" class="btn-submit">
            <span>JOIN NOW</span>
          </button>
        </form>

        <p class="switch-text">
          이미 회원이신가요?
          <button class="switch-btn" id="go-login">로그인</button>
        </p>
      </div>

    </div>
  </main>

  <!-- SUCCESS TOAST -->
  <div class="toast" id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="login.js"></script>
</body>
</html>
