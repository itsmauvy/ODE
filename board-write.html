  <meta charset="UTF-8" />

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="cart.css" />
  <link rel="stylesheet" href="board.css" />
</head>
<body>

  <!-- CURSOR -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursor-follower"></div>

  <!-- HEADER -->
  <header class="header" id="header" style="opacity:1">
    <nav class="nav-left">
      <div class="nav-item" id="nav-shop">
        <a href="shop.html" class="nav-link">SHOP</a>
      </div>
      <a href="about.html" class="nav-link">ABOUT</a>
      <a href="stockist.html" class="nav-link">STORE</a>
      <a href="board.html" class="nav-link">BOARD</a>
    </nav>
    <a href="index.html" class="logo">
      <img src="images/ode logo.png" alt="ODE" />
    </a>
    <nav class="nav-right">
      <a href="wishlist.html" class="nav-link">WISH</a>
      <a href="login.html" class="nav-link">LOGIN</a>
      <a href="cart.html" class="nav-link">BAG (<span class="bag-count-el">0</span>)</a>
    </nav>
    <button class="hamburger" id="hamburger" aria-label="메뉴">
      <span></span><span></span><span></span>
    </button>
  </header>
  <div class="mobile-menu" id="mobile-menu">
    <a href="shop.html" class="mobile-menu-link">SHOP</a>
    <a href="about.html" class="mobile-menu-link">ABOUT</a>
    <a href="stockist.html" class="mobile-menu-link">STORE</a>
    <a href="wishlist.html" class="mobile-menu-link">WISHLIST</a>
    <a href="board.html" class="mobile-menu-link">BOARD</a>
    <a href="login.html" class="mobile-menu-link">LOGIN</a>
  </div>

  <!-- WRITE -->
  <main class="boardpage">
    <div class="board-head">
      <p class="board-eyebrow">ODE COMMUNITY</p>
      <h1 class="board-title">Write a <em>Post</em></h1>
    </div>

    <form class="write-form" id="write-form" novalidate>
      <div class="write-row">
        <div class="write-group" style="max-width:200px">
          <label class="write-label" for="w-cat">분류</label>
          <select class="write-select" id="w-cat">
            <option value="review">리뷰</option>
            <option value="qna">Q&amp;A</option>
            <option value="free">자유</option>
            <option value="notice">공지</option>
          </select>
        </div>
        <div class="write-group">
          <label class="write-label" for="w-author">작성자</label>
          <input class="write-input" type="text" id="w-author" placeholder="이름 또는 닉네임" />
        </div>
      </div>

      <div class="write-group">
        <label class="write-label" for="w-title">제목</label>
        <input class="write-input" type="text" id="w-title" placeholder="제목을 입력하세요" />
      </div>

      <div class="write-group">
        <label class="write-label" for="w-body">내용</label>
        <textarea class="write-textarea" id="w-body" placeholder="내용을 입력하세요"></textarea>
      </div>

      <label class="write-secret">
        <input type="checkbox" id="w-secret" />
        <span class="write-secret-box"></span>
        <span class="write-secret-text">비밀글로 작성</span>
      </label>

      <span class="write-err" id="w-err"></span>

      <div class="write-actions">
        <a href="board.html" class="write-cancel">취소</a>
        <button type="submit" class="write-submit">등록</button>
      </div>
    </form>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-top">
      <div class="footer-logo">ODE</div>
      <div class="footer-links">
        <a href="#">이용약관</a>
        <a href="#">개인정보처리방침</a>
        <a href="#">고객센터</a>
        <a href="about.html">브랜드 소개</a>
      </div>
    </div>
    <div class="footer-bottom">
      <p>© 2026 ODE. All rights reserved.</p>
      <div class="footer-sns">
        <a href="#">INSTAGRAM</a>
        <a href="#">NAVER</a>
      </div>
    </div>
  </footer>

  <script src="cart.js"></script>
  <script src="board.js"></script>
</body>
</html>
